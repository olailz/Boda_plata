<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elias & Lorena - Bodas de Plata</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <section id="hero" class="hero">
        <div class="hero-content-wrapper">
            <div class="envelope-container">
                <img src="img/sobre.png" alt="Sobre" class="envelope-img">
            </div>
            <button id="btnOpen" class="btn-primary">Abrir invitación</button>
        </div>
    </section>

    <main id="main-content" class="hidden">
        
        <section class="container scroll-reveal">
            <h2 style="letter-spacing: 4px; font-size: 0.9rem; color: #888;">25 ANIVERSARIO</h2>
            
            <div class="triple-panel-container">
                <div class="panel panel-side">
                    <img src="img/Lat.png" class="panel-img" alt="Foto lateral">
                </div>
                <div class="panel panel-center">
                    <img src="img/newf.png" class="panel-img" alt="Foto principal">
                  <!--   <span class="name-overlay name-left">Elias</span>
                    <span class="name-overlay name-right">Lorena</span> -->
                </div>
                <div class="panel panel-side">
                    <img src="img/portada.png" class="panel-img" alt="Foto lateral">
                </div>
            </div>

            <h1 class="couple-names">Elias & Lorena</h1>
            <p style="font-style: italic; color: #666;">"Nuestro hogar no es un lugar… es el propósito de Dios cumpliéndose en nosotros."</p>
            <div class="divider"></div>
        </section>

        <section class="container scroll-reveal">
            <div class="grid">
                <div class="detail-card">
                    <h3 style="letter-spacing: 2px; margin-bottom: 10px;">CUÁNDO</h3>
                    <p>Domingo, 16 de Agosto 2026</p>
                    <p>14:00 Horas</p>
                </div>
                <div class="detail-card">
                    <h3 style="letter-spacing: 2px; margin-bottom: 10px;">DÓNDE</h3>
                    <p>Salón Municipal</p>
                    <p>Santa Catarina Pinula</p>
                    <a href="https://maps.app.goo.gl/ELxsYN79d6QbRGvd8" target="_blank" class="btn-maps">VER UBICACIÓN</a>
                </div>
            </div>
        </section>

        <section class="container scroll-reveal">
            <h3 style="letter-spacing: 3px; font-size: 0.8rem;">FALTAN</h3>
            <div id="countdown" class="countdown-container">
                <div class="time-box"><span id="days">00</span><small>Días</small></div>
                <div class="time-box"><span id="hours">00</span><small>Hrs</small></div>
                <div class="time-box"><span id="minutes">00</span><small>Min</small></div>
                <div class="time-box"><span id="seconds">00</span><small>Seg</small></div>
            </div>
        </section>

        <section class="container scroll-reveal">
            <div class="rsvp-box">
                <h3 style="letter-spacing: 3px; margin-bottom: 20px;">CONFIRMAR ASISTENCIA</h3>
                <form id="rsvpForm" class="rsvp-form">
                    <input type="text" name="name" placeholder="Tu nombre" required>
                    <div class="radio-group">
                        <label><input type="radio" name="attending" value="si" required> Si asistiré</label>
                        <label><input type="radio" name="attending" value="no"> No asistiré</label>
                    </div>
                    <textarea name="message" placeholder="Mensaje para nosotros..." rows="4"></textarea>
                    <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%;">Enviar Respuesta</button>
                </form>
            </div>
        </section>

        <footer style="padding: 4rem 0; color: #aaa; font-size: 0.8rem; letter-spacing: 2px;">
            E & L — 2026
        </footer>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
